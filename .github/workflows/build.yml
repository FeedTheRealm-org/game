      #   run: |
      #     echo "Image published to AWS ECR:"
      #     ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
      #     ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
      #     ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
      #     ECR_IMAGE="${ECR_IMAGE}:${{ steps.vars.outputs.tag }}"
