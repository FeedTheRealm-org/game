---
name: Mirror GHCR image to AWS ECR

"on":
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_REGION:
        required: true
      ECR_REGISTRY:
        required: true
      ECR_REPOSITORY:
        required: true

permissions:
  contents: read
  packages: read
  id-token: write

env:
  IMAGE_NAME: ftr-server

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Extract tag
        id: vars
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO_OWNER="${{ github.repository_owner }}"
          OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

          echo "Tag: $TAG"
          echo "Owner: $OWNER"

      - name: Login to GHCR
        run: |
          GHCR_USER="${{ github.actor }}"
          echo "${{ secrets.GITHUB_TOKEN }}" |
            docker login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Pull image from GHCR
        run: |
          OWNER="${{ steps.vars.outputs.owner }}"
          GHCR_IMAGE="ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}"
          GHCR_IMAGE="${GHCR_IMAGE}:${{ steps.vars.outputs.tag }}"
          echo "Pulling $GHCR_IMAGE"
          docker pull "$GHCR_IMAGE"

      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      #     aws-region: ${{ secrets.AWS_REGION }}

      # - name: Login to Amazon ECR
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR
        run: |
          OWNER="${{ steps.vars.outputs.owner }}"
          GHCR_IMAGE="ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}"
          GHCR_IMAGE="${GHCR_IMAGE}:${{ steps.vars.outputs.tag }}"
          ECR_IMAGE="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}"
          ECR_IMAGE="${ECR_IMAGE}:${{ steps.vars.outputs.tag }}"
          docker tag "$GHCR_IMAGE" "$ECR_IMAGE"

      # - name: Push image to ECR
      #   run: |
      #     ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
      #     ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
      #     ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
      #     ECR_IMAGE="${ECR_IMAGE}:${{ steps.vars.outputs.tag }}"

      #     echo "Pushing $ECR_IMAGE"
      #     docker push "$ECR_IMAGE"

