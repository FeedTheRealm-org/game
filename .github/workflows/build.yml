---
name: Build
on:
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_REGION:
        required: true
      ECR_REGISTRY:
        required: true
      ECR_REPOSITORY:
        required: true
      # SUPABASE_CERT:
      #   required: true
      GH_PAT:
        required: true
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # OIDC required
      contents: read

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # token with access
          submodules: recursive  # fetch submodules recursively

      - name: Set Image Tag
        id: tag
        run: >
          echo "image_tag=server-headless-$(date +%Y%m%d-%H%M%S)-
          $(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      #     aws-region: ${{ secrets.AWS_REGION }}

      # - name: Login to Amazon ECR
      #   uses: aws-actions/amazon-ecr-login@v2

      # Make sure submodules are on main branch
      - name: Force submodules to main
        run: |
          git submodule foreach 'git fetch origin main &&
          git checkout main && git pull origin main'

      - name: Echo build output
        run: ls -la Packages/1_FeedTheRealm_Shared

