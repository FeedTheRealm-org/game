syntax = "proto3";

package protocol;

option csharp_namespace = "FTR.Core.Common.Protocol.RpcMessages";

import "DialogStateType.proto";

// DialogOpened=0, DialogAdvanced=1, DialogClosed=2.
message DialogEventContent {
  DialogStateType dialog_state = 1;  // DialogState enum value
  string npc_id      = 2;  // Empty when dialog_state = DialogClosed
  int32  dialog_index = 3; // Message index within the active dialog
  string quest_id    = 4;  // Empty when no quest is associated with this message
  string dialog_id   = 5;  // ID of the DialogData being shown (empty when DialogClosed)
}
